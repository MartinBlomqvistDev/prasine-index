<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Prasine Index">
  <title>Prasine Index</title>
  <!-- Paper ground and deep green, taken from the site's own tokens
       (bg #f5f0e6, text #1a160d, green #163820). Prasine is a green, so the
       accent carries the name rather than decorating it.

       Two constraints this file has to respect:
       1. No double hyphen anywhere in a comment. It is illegal in XML and makes
          the whole SVG unparseable, so the token names are written bare above.
       2. The P is an outlined path, not a text element. Favicons rasterise in an
          isolated context where system font resolution is unreliable, so a text
          glyph can silently drop out. Geometry always renders. -->
  <rect width="32" height="32" rx="6" fill="#f5f0e6"/>
  <rect x="1.25" y="1.25" width="29.5" height="29.5" rx="5" fill="none"
        stroke="#d0c8b8" stroke-width="1.5"/>
  <path fill="#163820" fill-rule="evenodd"
        transform="translate(15.9 16) scale(1.2) translate(-15.9 -16)"
        d="M9.8 7
