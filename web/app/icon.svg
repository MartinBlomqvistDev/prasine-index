           C21.3 7 22.8 9 22.8 11.75
           C22.8 14.5 21.3 16.5 18.3 16.5
           L15.2 16.5
           L15.2 23.4
           L18.4 23.4
           L18.4 25
           L9 25
           L9 23.4
           L12 23.4
           L12 8.6
           L9.8 8.6
           Z
           M15.2 10
           L18 10
           C19.6 10 20.4 10.7 20.4 11.75
           C20.4 12.8 19.6 13.5 18 13.5
           L15.2 13.5
           Z"/>
</svg>
