# Prasine Index — Continuous Integration
#
# Runs on every push and pull request:
#   1. Lint (ruff)
#   2. Type check (mypy)
#   3. Unit tests (pytest tests/)
#
# The golden dataset eval (eval/golden_dataset.py) requires ANTHROPIC_API_KEY
# and a live database. It runs as a separate workflow (eval.yml) triggered
# manually or on pushes to main, not on every PR.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .


  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt mypy

      - name: Run mypy
        run: mypy agents/ core/ ingest/ models/ api/ eval/


  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          TESTING: "true"
        run: pytest tests/ -v --tb=short
